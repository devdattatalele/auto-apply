# Resume picker configuration
# The engine matches JD keywords to pick the best resume variant.
# If only one resume, it's always used.

default: general

resumes:
  - id: general
    file: resumes/my-resume.pdf
    label: "General"
    keywords:
      - software engineer
      - backend
      - frontend
      - full stack

